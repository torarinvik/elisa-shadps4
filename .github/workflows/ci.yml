name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cross-platform compile-check for the emulator. Each OS runner's default target
# selects that platform's `static if PLATFORM_*` branches, so the three runners
# together verify the macOS / Linux / Windows code paths compile. We use
# `-emit semantic` (typecheck only) so we are not blocked by the native-bridge
# link step (the *Elisa_* FFI impls are resolved only at final exe link).
jobs:
  emulator-compile:
    name: emulator compile / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Checkout emulator
        uses: actions/checkout@v4
        with:
          path: emulator

      # Safety-surface ratchet: fail if any `trusted Unsafe.<Category>` count
      # exceeds tools/unsafe_baseline.txt or a new category appears. Hard-fails
      # (no continue-on-error) so the unsafe surface cannot silently grow.
      - name: Unsafe escape-hatch ratchet (Linux)
        if: runner.os == 'Linux'
        run: |
          cd emulator
          bash tools/unsafe_ratchet.sh

      - name: Checkout compiler (Elisa-core)
        uses: actions/checkout@v4
        with:
          repository: torarinvik/Elisa-core
          path: Elisa-core

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: Elisa-core/compiler/go.sum

      # ---- LLVM / clang per platform (to build elisac) ----
      - name: Install LLVM 19 + clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19
          sudo ln -sf libLLVM.so /usr/lib/llvm-19/lib/libLLVM-C.so
          sudo ln -sf /usr/bin/clang-19 /usr/local/bin/clang

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install MinGW gcc + LLVM (Windows; MSYS2 preinstalled at C:\msys64)
        if: runner.os == 'Windows'
        run: |
          C:/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm && pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-llvm"

      - name: Install z3 4.16 (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          case "${{ runner.os }}" in
            Linux) Z=z3-4.16.0-x64-glibc-2.39.zip ;;
            macOS) Z=z3-4.16.0-arm64-osx-15.7.3.zip ;;
          esac
          # curl (system certs) instead of python urllib, which fails SSL on macOS runners
          curl -fsSL -o z3.zip "https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/$Z"
          unzip -q z3.zip
          D="${Z%.zip}"
          chmod +x "$D/bin/z3"
          echo "$PWD/$D/bin" >> "$GITHUB_PATH"
          "$D/bin/z3" --version
      - name: Build elisac (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd Elisa-core/compiler
          go build -o "$RUNNER_TEMP/elisac" ./src

      - name: Build elisac (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "C:\msys64\mingw64\bin\gcc.exe"
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          Set-Location Elisa-core/compiler
          go build -o "$env:RUNNER_TEMP\elisac.exe" ./src

      # The emulator includes ../../compiler/runtime/... (file-relative from
      # emulator/<dir>/file.elisa -> <workspace>/compiler/runtime/...).
      - name: Provide compiler runtime for includes
        run: |
          mkdir -p compiler
          cp -r Elisa-core/compiler/runtime compiler/runtime

      # Strict safety gate: run WITHOUT -permissive so Elisa's unsafe-permission,
      # region-discipline and progress-safety enforcement is active, and HARD-FAIL
      # if any `error:` diagnostic appears. Advisory warnings (lints) are allowed so
      # the gate locks in the 0-error posture without blocking on the lint backlog.
      - name: Strict safety gate — 0 errors (Linux)
        if: runner.os == 'Linux'
        run: |
          cd emulator
          set +e
          "$RUNNER_TEMP/elisac" -emit semantic elisa_tests/emulator_core_boot_smoke.elisa > "$RUNNER_TEMP/strict.log" 2>&1
          set -e
          if grep -qE '\berror:' "$RUNNER_TEMP/strict.log"; then
            echo "::error::strict-mode semantic errors found (Elisa safety enforcement is ON):"
            grep -nE '\berror:' "$RUNNER_TEMP/strict.log"
            exit 1
          fi
          echo "Strict mode: 0 errors ($(grep -cE '\bwarning:' "$RUNNER_TEMP/strict.log") advisory warnings allowed)."

      - name: Compile-check emulator (Linux / macOS)
        continue-on-error: true
        if: runner.os != 'Windows'
        run: |
          cd emulator
          "$RUNNER_TEMP/elisac" -emit semantic -permissive elisa_tests/emulator_core_boot_smoke.elisa

      - name: Compile-check emulator (Windows)
        continue-on-error: true
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"   # libLLVM-22.dll for elisac startup
          Set-Location emulator
          & "$env:RUNNER_TEMP\elisac.exe" -emit semantic -permissive elisa_tests/emulator_core_boot_smoke.elisa
